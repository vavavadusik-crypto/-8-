name: CI Gate

# Полный quality gate на серверах GitHub (публичный репо = безлимит минут).
# Снимает тяжёлый билд (ffmpeg-рендеры + 451 unit-тест) с локального ноутбука.
on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install ffmpeg + ensure media tools at /usr/bin
        run: |
          # Код зашивает /usr/bin/{ffmpeg,ffprobe,google-chrome}. apt кладёт
          # ffmpeg/ffprobe ровно в /usr/bin — окружение совпадает с локальным.
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          test -x /usr/bin/ffmpeg  || { echo "::error::/usr/bin/ffmpeg missing"; exit 1; }
          test -x /usr/bin/ffprobe || { echo "::error::/usr/bin/ffprobe missing"; exit 1; }
          /usr/bin/ffmpeg -version | head -1
          /usr/bin/ffprobe -version | head -1
          # Chrome для сцен-композера: на ubuntu-latest обычно /usr/bin/google-chrome;
          # если нет — симлинкуем stable, иначе рендер честно падает на legacy-сцены.
          if [ ! -e /usr/bin/google-chrome ]; then
            chrome="$(command -v google-chrome-stable || true)"
            [ -n "$chrome" ] && sudo ln -sf "$chrome" /usr/bin/google-chrome || true
          fi
          /usr/bin/google-chrome --version 2>/dev/null | head -1 || echo "chrome: legacy-scene fallback"

      # ffmpeg/ffprobe/google-chrome предустановлены на ubuntu-latest.
      # piper + голосовые модели кэшируем, чтобы качать один раз.
      - name: Cache piper binary and voices
        id: piper-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/opt/piper
            ~/.local/share/piper/voices
          key: piper-${{ runner.os }}-${{ hashFiles('scripts/install-piper-ci.sh') }}

      - name: Install piper (TTS) + voices
        run: bash scripts/install-piper-ci.sh

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for high/critical vulnerabilities
        run: npm audit --omit=dev --audit-level=high

      - name: Run full quality gate
        run: npm run check
        env:
          # Chrome на раннере ставится как google-chrome-stable → /usr/bin/google-chrome.
          HERMEST_CHROME_PATH: /usr/bin/google-chrome
