services:
  hermes-board:
    build:
      context: .
      dockerfile: Dockerfile.selfhost
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      HERMEST_CHROME_PATH: /usr/bin/chromium
      # BYOK keys (NO hardcoded values — user supplies via .env)
      HERMEST_ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      HERMEST_FAL_API_KEY: ${FAL_API_KEY:-}
      HERMEST_PEXELS_API_KEY: ${PEXELS_API_KEY:-}
    volumes:
      # Render output (job-manager writes to /tmp, ephemeral в контейнере — не persist,
      # но можно добавить named volume если нужно сохранить между перезапусками)
      # - render-output:/tmp
      # Workspace data (.data/ хранит SQLite workspace store)
      - workspace-data:/app/.data
    restart: unless-stopped

volumes:
  workspace-data:
